<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <base href="./">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>التواصل — Quarx AI | آرائك واقتراحاتك مهمة</title>
  <meta name="description" content="تواصل مع فريق Quarx AI - أرسل لنا ملاحظاتك واقتراحاتك لتحسين أدواتنا المجانية.">
  <meta name="keywords" content="تواصل, ملاحظات, اقتراحات, contact, feedback, support">
  <link rel="canonical" href="https://quarxai.com/ar/contact.html">
  <link rel="alternate" hreflang="ar" href="https://quarxai.com/ar/contact.html">
  <link rel="alternate" hreflang="en" href="https://quarxai.com/contact.html">
  <link rel="alternate" hreflang="x-default" href="https://quarxai.com/contact.html">
  <meta property="og:title" content="التواصل — Quarx AI">
  <meta property="og:description" content="تواصل معنا - أرسل ملاحظاتك واقتراحاتك لتحسين أدواتنا.">
  <meta property="og:type" content="website">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="icon" href="../favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="../favicon.png">
  <script>!function(){var t=localStorage.getItem('devtools-theme'),e=t||((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');if('dark'===e){if(!document.documentElement.style.colorScheme)document.documentElement.style.colorScheme='dark';document.body.setAttribute('data-theme','dark')}else{document.documentElement.style.colorScheme='light';document.body.removeAttribute('data-theme')}}()</script>
  <link rel="preload" href="../css/style.css" as="style" onload="this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="../css/style.css"></noscript>
</head>
<body data-page="contact">
  <header id="site-header"></header>
  <main class="container">
    <section class="hero">
      <h1 class="site-title" data-i18n="contact.title">التواصل معنا</h1>
      <p class="lead" data-i18n="contact.lead">نود أن نسمع آرائك وملاحظاتك. استخدم النموذج أدناه لإرسال تعليقاتك أو الإبلاغ عن مشكلة.</p>
    </section>

    <section class="panel">
      <form id="contact-form">
        <label for="name" data-i18n="contact.label.name">الاسم</label>
        <input id="name" name="name" data-i18n-placeholder="contact.placeholder.name" placeholder="اسمك" />
        <label for="email" data-i18n="contact.label.email">البريد الإلكتروني</label>
        <input id="email" name="email" type="email" data-i18n-placeholder="contact.placeholder.email" placeholder="you@example.com" />
        <label for="message" data-i18n="contact.label.message">الرسالة</label>
        <textarea id="message" name="message" rows="6" data-i18n-placeholder="contact.placeholder.message" placeholder="كيف يمكننا مساعدتك؟"></textarea>
        <div class="tool-actions">
          <button type="button" id="contact-send" class="btn" data-i18n="contact.btn.send">إرسال</button>
          <button type="button" id="contact-reset" class="btn btn-ghost" data-i18n="contact.btn.reset">مسح</button>
        </div>
      </form>
    </section>

    <section class="panel" style="margin-top:20px">
      <h3 data-i18n="contact.social.title">تواصل اجتماعي</h3>
      <p data-i18n="contact.social.lead" style="color:var(--muted);margin-bottom:14px">يمكنك أيضاً التواصل معنا على وسائل التواصل الاجتماعي:</p>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <a href="https://wa.me/966556709988" target="_blank" rel="noopener noreferrer" class="btn" style="gap:6px;text-decoration:none">
          <span style="font-size:1.2rem">📱</span>
          <span>واتساب</span>
        </a>
        <a href="https://facebook.com/quarxai" target="_blank" rel="noopener noreferrer" class="btn btn-ghost" style="gap:6px;text-decoration:none">
          <span style="font-size:1.2rem">👍</span>
          <span>فيسبوك</span>
        </a>
        <a href="https://instagram.com/quarxai" target="_blank" rel="noopener noreferrer" class="btn btn-ghost" style="gap:6px;text-decoration:none">
          <span style="font-size:1.2rem">📸</span>
          <span>إنستجرام</span>
        </a>
      </div>
    </section>
  </main>
  <footer id="site-footer"></footer>
  <script src="../js/main.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function(){
      const send = document.getElementById('contact-send');
      const reset = document.getElementById('contact-reset');
      const form = document.getElementById('contact-form');
      if(send){ send.addEventListener('click', ()=>{
        const name = document.getElementById('name').value || 'Anonymous';
        const email = document.getElementById('email').value || '';
        const msg = document.getElementById('message').value || '';
        const body = encodeURIComponent('From: '+name+' ('+email+')\n\n'+msg);
        window.location.href = 'gmail:hasanjohan3939@gmail.com?subject='+encodeURIComponent('Feedback from '+name)+'&body='+body;
      }); }
      if(reset){ reset.addEventListener('click', ()=>{ form.reset(); }); }
    });
  </script>
</body>
</html>
