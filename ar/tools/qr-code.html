<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <base href="../../">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>مولد رموز QR — Quarx AI | توليد QR Code</title>
  <meta name="description" content="مولد رموز QR - أداة مجانية لتوليد رموز QR من نص أو روابط ويب.">
  <meta name="keywords" content="مولد QR, QR code, توليد رموز, QR code عربي">
  <link rel="canonical" href="https://quarxai.com/ar/tools/qr-code.html">
  <link rel="alternate" hreflang="ar" href="https://quarxai.com/ar/tools/qr-code.html">
  <link rel="alternate" hreflang="en" href="https://quarxai.com/tools/qr-code.html">
  <link rel="alternate" hreflang="x-default" href="https://quarxai.com/tools/qr-code.html">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <link rel="icon" href="../../favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="../../favicon.png">
  <link rel="preload" href="../../css/style.css" as="style" onload="this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="../../css/style.css"></noscript>
</head>
<body data-page="tool-qr">
  <div id="site-header"></div>
  <main class="container tool">
    <h1 class="tool-title" data-i18n="tool.qr_code">مولد رموز QR</h1>
    <p style="color:var(--muted)" data-i18n="qr.lead">أدخل نص أو رابط لإنشاء رمز QR.</p>

    <section class="panel">
      <label for="qr-input" data-i18n="qr.label.input">النص أو الرابط</label>
      <input id="qr-input" data-i18n-placeholder="qr.placeholder.input" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(15,23,42,0.04)">
      <div class="tool-actions">
        <button id="qr-gen" class="btn" data-i18n="qr.btn.generate">وليد</button>
        <button id="qr-copy" class="btn btn-small" data-i18n="qr.btn.copy">انسخ رابط الصورة</button>
      </div>
    </section>
    <section class="panel">
      <label data-i18n="qr.label.preview">معاينة QR</label>
      <div id="qr-preview" style="display:flex;justify-content:center;padding:12px">
        <img id="qr-img" alt="qr" src="" loading="lazy" style="width:200px;height:200px;border-radius:8px;border:1px solid rgba(15,23,42,0.04)">
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../../js/main.js" defer></script>
</body>
</html>
