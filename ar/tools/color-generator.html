<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <base href="../../">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>مولد الألوان — Quarx AI | توليد ألوان عشوائية</title>
  <meta name="description" content="مولد الألوان - أداة مجانية لتوليد ألوان عشوائية بصيغ HEX و RGB و HSL. انسخ الألوان بسهولة.">
  <meta name="keywords" content="مولد الألوان, توليد ألوان, HEX RGB HSL, لوحة الألوان">
  <link rel="canonical" href="https://quarxai.com/ar/tools/color-generator.html">
  <link rel="alternate" hreflang="ar" href="https://quarxai.com/ar/tools/color-generator.html">
  <link rel="alternate" hreflang="en" href="https://quarxai.com/tools/color-generator.html">
  <link rel="alternate" hreflang="x-default" href="https://quarxai.com/tools/color-generator.html">
  <meta property="og:type" content="article">
  <meta property="og:title" content="مولد الألوان — Quarx AI">
  <meta property="og:description" content="وليد ألوان عشوائية بجودة عالية بصيغ HEX و RGB و HSL.">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="../../favicon.svg?v=2" type="image/svg+xml">
  <link rel="icon" href="../../favicon.png?v=2" type="image/png">
  <link rel="apple-touch-icon" href="../../favicon.png?v=2">
  <script>!function(){var t=localStorage.getItem('devtools-theme'),e=t||((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');if('dark'===e){if(!document.documentElement.style.colorScheme)document.documentElement.style.colorScheme='dark';document.body&&document.body.setAttribute('data-theme','dark')}else{document.documentElement.style.colorScheme='light';document.body&&document.body.removeAttribute('data-theme')}}()</script>
  <link rel="preload" href="../../css/style.css" as="style" onload="this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="../../css/style.css"></noscript>
</head>
<body data-page="color-generator">
  <div id="site-header"></div>

  <main class="container tool">
    <h1 class="tool-title" data-i18n="tool.color_generator">مولد الألوان</h1>
    <p style="color:var(--muted)" data-i18n="cg.lead">وليد الألوان ولوحات الألوان.</p>

    <section class="panel">
      <div class="color-row">
        <div id="color-swatch" class="swatch" aria-hidden="true"></div>
        <div class="color-values">
          <div><label data-i18n="cg.label.hex">HEX</label><input id="hex" readonly></div>
          <div><label data-i18n="cg.label.rgb">RGB</label><input id="rgb" readonly></div>
          <div><label data-i18n="cg.label.hsl">HSL</label><input id="hsl" readonly></div>
        </div>
      </div>

      <div class="tool-actions">
        <button id="gen-color" class="btn" data-i18n="cg.btn.generate">وليد</button>
        <button id="copy-hex" class="btn btn-small" data-i18n="cg.btn.copy_hex">انسخ HEX</button>
        <button id="copy-rgb" class="btn btn-small btn-ghost" data-i18n="cg.btn.copy_rgb">انسخ RGB</button>
      </div>
    </section>
    <!-- Ad Middle -->
  </main>

  <div id="site-footer"></div>
  <!-- Ad Bottom -->
  <script src="../../js/main.js" defer></script>
</body>
</html>
